model:
  act: null
  hidden_layer: False
  dino_embed_dim: 768

train:
  lr: 0.00003
  ltype: 'infonce'
  num_epochs: 30
  batch_size: 128
  save_best_model: False
  num_workers: 8

  lambda_obj: 0.0
  lambda_gw: 1.0
  lambda_struct: 50.0

  patch_temperature: 0.07
  em_iters: 1
  num_parts: 116
  min_proto_count: 1

  #   anchor = mean selected single anchor patch tokens by part id
  #   zpart  = mean EM-pooled pseudo part features by part id
  stage2_visual_source: anchor

  gw_only_steps_per_epoch: 1
  gw_max_iter: 20
  gw_restarts: 50

  audit_structure_every: 1
  audit_anchor_every: 0

dataset:
  min_obj_area_ratio: 0.0
